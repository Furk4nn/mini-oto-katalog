name: mini_oto_katalog
description: Flutter Mini Oto Katalog Uygulaması - Staj Projesi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"  
